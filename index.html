<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitTrack" />
  <meta name="theme-color" content="#0F1117" />
  <title>FitTrack</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <span class="header-title">FitTrack</span>
        <span id="today-date"></span>
      </div>
    </header>

    <main id="page-content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-page="nutrition">
        <span class="nav-icon">🥗</span>
        <span class="nav-label">Nutrition</span>
      </button>
      <button class="nav-btn" data-page="workout">
        <span class="nav-icon">💪</span>
        <span class="nav-label">Workout</span>
      </button>
      <button class="nav-btn" data-page="progress">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Progress</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
